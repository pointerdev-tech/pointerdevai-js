name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint client
        run: npm -w @pointerdev/pointerai-client run lint

      - name: Lint widget
        run: npm -w @pointerdev/pointerai-widget run lint

      - name: Widget smoke test
        run: npm -w @pointerdev/pointerai-widget run smoke
